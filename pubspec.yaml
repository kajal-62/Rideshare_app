name: rideshare_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  flutter_map: ^7.0.2
  geolocator: ^11.0.0
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_icons:
    android: true
    ios: true
    image_path: "assets/icon/app_icon.png"
    adaptive_icon_background: "#2563EB"
    min_sdk_android: 21